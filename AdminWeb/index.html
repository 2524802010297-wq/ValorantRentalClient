<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Valorant Account Rental</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f1923 0%, #1a2a3a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 70, 85, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header h1 span {
            color: #ff4655;
        }

        .login-header p {
            color: #888;
            font-size: 14px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff4655;
            background: rgba(0, 0, 0, 0.5);
        }

        .form-group input::placeholder {
            color: #666;
        }

        .btn-login {
            background: #ff4655;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #ff5f6d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 70, 85, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            color: #ff4655;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            min-height: 20px;
        }

        .server-status {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4655;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #4caf50;
            animation: none;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="server-status" id="serverStatus">
        <span class="status-dot"></span>
        <span>Đang kiểm tra kết nối...</span>
    </div>

    <div class="login-container">
        <div class="login-header">
            <h1>VALORANT <span>ADMIN</span></h1>
            <p>Đăng nhập để quản lý hệ thống</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Tên đăng nhập" autocomplete="off">
            </div>

            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Mật khẩu">
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Đăng nhập
            </button>

            <div class="error-message" id="errorMessage"></div>
        </form>
    </div>

    <script>
        const apiBaseUrl = 'http://localhost:5000/api';

        // Kiểm tra server connection
        async function checkServerConnection() {
            const statusElement = document.getElementById('serverStatus');
            const dotElement = statusElement.querySelector('.status-dot');
            const textElement = statusElement.querySelector('span:last-child');
            
            try {
                const response = await fetch(`${apiBaseUrl}/admin/statistics`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' },
                    mode: 'cors'
                });
                
                if (response.ok) {
                    dotElement.classList.add('connected');
                    textElement.textContent = 'Đã kết nối server';
                } else {
                    dotElement.classList.remove('connected');
                    textElement.textContent = 'Mất kết nối server';
                }
            } catch (error) {
                dotElement.classList.remove('connected');
                textElement.textContent = 'Không thể kết nối server';
            }
        }

        // Xử lý đăng nhập
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            
            if (!username || !password) {
                errorMessage.textContent = 'Vui lòng nhập đầy đủ thông tin';
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
            errorMessage.textContent = '';
            
            try {
                const response = await fetch(`${apiBaseUrl}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.token) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'dashboard.html';
                } else {
                    errorMessage.textContent = data.message || 'Sai tên đăng nhập hoặc mật khẩu';
                }
            } catch (error) {
                errorMessage.textContent = 'Lỗi kết nối server: ' + error.message;
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Đăng nhập';
            }
        });

        // Kiểm tra server khi load trang
        checkServerConnection();
        setInterval(checkServerConnection, 5000);
    </script>
</body>
</html>
